# ============================================================
# SWIFT SPEED SENDER — NETLIFY CONFIG
# ============================================================

[build]
  publish = "src"
  functions = "netlify/functions"

# ---- Redirects ----
[[redirects]]
  from = "/admin"
  to = "/pages/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/pages/admin/:splat"
  status = 200

[[redirects]]
  from = "/track"
  to = "/pages/track.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/pages/services.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 200

# ---- Headers — Security + Cache ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache HTML: short (so admin changes show quickly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

# Cache CSS/JS: longer with version busting via filename hash
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images: 1 week
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ---- Functions config ----
[functions]
  node_bundler = "esbuild"
